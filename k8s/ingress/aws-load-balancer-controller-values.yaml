# Helm values for the AWS Load Balancer Controller.
#
#   helm repo add eks https://aws.github.io/eks-charts
#   helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
#     -n kube-system -f aws-load-balancer-controller-values.yaml
#
# This controller is what turns an Ingress object into a real AWS ALB. Without
# it, the Ingress in ingress.yaml is inert — nothing provisions the load
# balancer. It watches Ingress/Service objects and reconciles ALBs/target groups
# to match.

clusterName: insurance-cluster
region: us-east-1

# The controller needs the VPC ID to place the ALB and its subnets correctly.
vpcId: "<VPC_ID>"   # placeholder — the EKS cluster's VPC

serviceAccount:
  # IRSA again: the controller's ServiceAccount is annotated with an IAM role
  # that grants exactly the elasticloadbalancing:* / ec2:Describe* permissions
  # it needs — nothing more. This is why the controller can create ALBs but a
  # random application pod on the same node cannot.
  create: true
  name: aws-load-balancer-controller
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::<ACCOUNT_ID>:role/eks-aws-load-balancer-controller"  # placeholder

replicaCount: 1   # single small cluster; raise to 2 for controller HA in prod

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
